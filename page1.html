  <h2>Саймон "Ghost" Райлі</h2>
  <div class="card">
    <p>Ghost — елітний боєць Task Force 141 і один із найзагадковіших персонажів.</p>
    <p>Його справжнє ім'я — Саймон Райлі. Він пережив важке дитинство та травми війни.</p>
    <p>Його фірмова маска з черепом стала символом серії.</p>
